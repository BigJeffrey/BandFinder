services:
  postgres:
    image: postgres:15-alpine
    container_name: bandfinder-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - bandfinder-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    image: ghcr.io/bigjeffrey/bandfinder-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bandfinder-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: ${NODE_ENV}
      PORT: 3000
    ports:
      - "3000:3000"
    networks:
      - bandfinder-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    image: ghcr.io/bigjeffrey/bandfinder-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bandfinder-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - bandfinder-network
    depends_on:
      - backend

volumes:
  postgres_data:
    driver: local

networks:
  bandfinder-network:
    driver: bridge
